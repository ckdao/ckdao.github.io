<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <!-- FONTS: Bebas Neue (display/headers) + Barlow (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
  <style>
  :root{
    --bg:#060606;--surface:#0d0d0d;--border:rgba(255,255,255,.06);
    --text:#c8c8c8;--text-muted:#444;--accent:#c8a96e;
    --font-display:'Bebas Neue',sans-serif;--font-body:'Barlow',system-ui,sans-serif;
    --nav-h:54px;--gap:3px;--r:3px;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;overflow-x:hidden}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh}
  /* ─── NAV ─── */
  .nav{
    position:fixed;top:0;left:0;right:0;height:var(--nav-h);
    display:flex;align-items:center;padding:0 24px;
    background:rgba(6,6,6,.88);backdrop-filter:blur(24px) saturate(1.3);
    border-bottom:1px solid var(--border);z-index:100;
  }
  /* Logo slot */
  .nav-logo{
    width:40px;height:40px;margin-right:32px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.1);border-radius:2px;
    overflow:hidden;cursor:pointer;background:var(--surface);
  }
  .nav-logo img{width:100%;height:100%;object-fit:contain;display:block}
  .nav-logo-placeholder{
    font-family:var(--font-display);font-size:16px;
    letter-spacing:.1em;color:rgba(255,255,255,.2);user-select:none;line-height:1
  }
  .nav-tabs{display:flex;height:100%;gap:0}
  .tab{
    background:none;border:none;font-family:var(--font-display);
    color:var(--text-muted);font-size:14px;letter-spacing:.18em;
    padding:0 22px;height:100%;cursor:pointer;position:relative;
    transition:color .2s ease;
  }
  .tab::after{
    content:"";position:absolute;bottom:0;left:22px;right:22px;
    height:1px;background:var(--accent);
    transform:scaleX(0);transform-origin:left;
    transition:transform .3s var(--ease);
  }
  .tab:hover{color:rgba(200,200,200,.65)}
  .tab.active{color:var(--text)}
  .tab.active::after{transform:scaleX(1)}

  /* ─── PAGES + TRANSITIONS ─── */
  .page{display:none;min-height:calc(100vh - var(--nav-h));padding-top:var(--nav-h)}
  .page.active{display:block}
  .page.page-in{animation:pageIn .38s var(--ease) both}
  @keyframes pageIn{
    from{opacity:0;transform:translateY(14px)}
    to  {opacity:1;transform:translateY(0)}
  }

  /* ─── VIDEO GRID ─── */
  .video-grid{display:grid;gap:var(--gap);padding:var(--gap)}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:1100px){.cols-4{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:800px){.cols-4,.cols-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.cols-4,.cols-3{grid-template-columns:1fr}}
  .video-cell{
    position:relative;aspect-ratio:16/9;overflow:hidden;
    border-radius:var(--r);background:var(--surface);cursor:pointer;
  }
  .video-cell video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s var(--ease)}
  .video-cell:hover video{transform:scale(1.05)}
  .video-cell::before{
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.03) 50%,transparent 75%);
    background-size:200% 100%;animation:shimmer 2.2s ease-in-out infinite;transition:opacity .4s ease;
  }
  .video-cell.loaded::before{opacity:0;pointer-events:none}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .cell-overlay{
    position:absolute;inset:0;z-index:2;
    background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.06) 42%,transparent 68%);
    opacity:0;transition:opacity .25s ease;
    display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;
  }
  .video-cell:hover .cell-overlay{opacity:1}
  .cell-title{
    font-family:var(--font-display);font-size:11px;letter-spacing:.13em;
    color:rgba(255,255,255,.9);line-height:1.3;text-transform:uppercase;
  }
  .cell-watch{font-family:var(--font-body);font-size:8px;color:var(--accent);letter-spacing:.1em;margin-top:5px;text-transform:uppercase}
  .cell-num{position:absolute;top:8px;left:10px;z-index:2;font-size:9px;font-weight:500;color:rgba(255,255,255,.15);font-variant-numeric:tabular-nums;font-family:var(--font-body)}

  /* ─── MASONRY ─── */
  .masonry-grid{columns:3;column-gap:var(--gap);padding:var(--gap)}
  @media(max-width:1000px){.masonry-grid{columns:2}}
  @media(max-width:500px){.masonry-grid{columns:1}}
  .masonry-item{break-inside:avoid;margin-bottom:var(--gap);position:relative;overflow:hidden;border-radius:var(--r);background:var(--surface);cursor:pointer;display:block}
  .masonry-item img{width:100%;height:auto;display:block;transition:transform .7s var(--ease)}
  .masonry-item:hover img{transform:scale(1.04)}
  .masonry-item::before{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.03) 50%,transparent 75%);background-size:200% 100%;animation:shimmer 2.2s ease-in-out infinite;transition:opacity .4s ease}
  .masonry-item.loaded::before{opacity:0;pointer-events:none}
  .masonry-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 50%);opacity:0;transition:opacity .25s ease;display:flex;align-items:flex-end;padding:12px 14px}
  .masonry-item:hover .masonry-overlay{opacity:1}
  .masonry-num{position:absolute;top:9px;left:11px;z-index:2;font-size:9px;font-weight:500;color:rgba(255,255,255,.18);font-family:var(--font-body)}
  .masonry-label{font-family:var(--font-display);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.85)}

  /* ─── ABOUT ─── */
  .about-wrap{max-width:720px;margin:0 auto;padding:64px 32px 96px}
  .about-header{margin-bottom:52px}
  .about-name{font-family:var(--font-display);font-size:clamp(3.8rem,9vw,8rem);letter-spacing:.04em;color:var(--text);line-height:.9;text-transform:uppercase}
  .about-role{font-family:var(--font-display);font-size:11px;letter-spacing:.28em;color:var(--accent);margin-top:18px;text-transform:uppercase;opacity:.8}
  /* stats */
  .about-stats{display:flex;align-items:center;gap:0;margin-bottom:60px;border:1px solid rgba(255,255,255,.06);border-radius:var(--r);overflow:hidden}
  .stat{flex:1;padding:22px 28px;text-align:center}
  .stat-div{width:1px;background:rgba(255,255,255,.06);align-self:stretch}
  .stat-val{font-family:var(--font-display);font-size:clamp(2rem,4vw,3rem);color:var(--accent);letter-spacing:.04em;line-height:1}
  .stat-lbl{font-family:var(--font-body);font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-top:6px}
  /* bio blocks */
  .bio-blocks{display:flex;flex-direction:column;gap:36px;margin-bottom:0}
  .bio-block{padding:28px 32px;border:1px solid rgba(255,255,255,.05);border-radius:var(--r);background:rgba(255,255,255,.018);position:relative}
  .bio-block::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:1px;background:linear-gradient(180deg,transparent,rgba(200,169,110,.3),transparent)}
  .bio-block-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .bio-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid rgba(200,169,110,.2);border-radius:2px;color:var(--accent);flex-shrink:0}
  .bio-title{font-family:var(--font-display);font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--text)}
  .bio-text{font-family:var(--font-body);font-size:14px;font-weight:300;line-height:1.9;color:rgba(200,200,200,.45)}
  .bio-text+.bio-text{margin-top:14px}
  .bio-em{color:rgba(200,169,110,.85);font-style:normal}
  /* divider */
  .about-line{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07) 30%,rgba(255,255,255,.07) 70%,transparent);margin:52px 0 40px}
  /* contact */
  .contact-section{
    padding: 28px 32px;
    border: 1px solid rgba(200,169,110,.18);
    border-radius: var(--r);
    background: linear-gradient(120deg, rgba(200,169,110,.06) 0%, rgba(200,169,110,.02) 100%);
    position: relative;
    overflow: hidden;
  }
  .contact-section::before{
    content:"";position:absolute;top:0;left:0;right:0;height:1px;
    background: linear-gradient(90deg, transparent, rgba(200,169,110,.4) 40%, rgba(200,169,110,.4) 60%, transparent);
  }
  .contact-lbl{font-family:var(--font-display);font-size:11px;letter-spacing:.28em;color:var(--accent);margin-bottom:8px;text-transform:uppercase;opacity:.9}
  .contact-note{font-family:var(--font-body);font-size:12px;font-weight:300;color:rgba(200,169,110,.45);margin-bottom:20px;letter-spacing:.01em}
  .about-links{display:flex;flex-wrap:wrap;gap:8px}
  .about-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:10px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:rgba(200,169,110,.6);border:1px solid rgba(200,169,110,.18);padding:10px 20px;border-radius:2px;transition:color .18s ease,border-color .18s ease,background .18s ease}
  .about-link:hover{color:var(--accent);border-color:rgba(200,169,110,.5);background:rgba(200,169,110,.07)}
  @media(max-width:600px){
    .about-wrap{padding:40px 20px 60px}
    .stat{padding:18px 16px}
    .bio-block{padding:22px 20px}
  }

  /* ─── MODAL ─── */
  .modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .28s ease}
  .modal.open{opacity:1;pointer-events:all}
  .modal-bd{position:absolute;inset:0;background:rgba(0,0,0,.94);backdrop-filter:blur(14px)}
  .modal-box{position:relative;z-index:1;width:100%;max-width:1000px;transform:translateY(18px) scale(.97);transition:transform .36s var(--ease)}
  .modal.open .modal-box{transform:translateY(0) scale(1)}
  .modal-vwrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:3px;overflow:hidden}
  #modal-video{width:100%;height:100%;object-fit:contain;display:block}
  .modal-iwrap{width:100%;display:flex;align-items:center;justify-content:center;background:#000;border-radius:3px;overflow:hidden}
  #modal-img{max-width:100%;max-height:78vh;object-fit:contain;display:block}
  .modal-close{position:absolute;top:-40px;right:0;background:none;border:none;color:rgba(255,255,255,.3);font-size:24px;cursor:pointer;padding:4px 8px;transition:color .14s ease;font-family:var(--font-body);line-height:1}
  .modal-close:hover{color:#fff}
  .modal-info{padding:16px 2px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .modal-text{flex:1;min-width:0}
  .modal-title{font-family:var(--font-display);font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:var(--text)}
  .modal-desc{font-family:var(--font-body);font-size:13px;font-weight:300;line-height:1.75;color:rgba(200,200,200,.45);margin-top:7px;max-width:64ch}
  .modal-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-display);font-size:11px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--accent);border:1px solid rgba(200,169,110,.3);padding:8px 18px;border-radius:2px;white-space:nowrap;flex-shrink:0;align-self:flex-start;transition:background .15s ease,border-color .15s ease}
  .modal-btn:hover{background:rgba(200,169,110,.1);border-color:var(--accent)}
  .hidden{display:none !important}

  /* ─── SECTION BANNER ─── */
  .section-banner{
    padding: 32px 40px;
    margin: var(--gap);
    margin-bottom: 0;
    border-radius: var(--r);
    background: linear-gradient(105deg, rgba(200,169,110,.055) 0%, rgba(200,169,110,.012) 60%, transparent 100%);
    border: 1px solid rgba(200,169,110,.13);
    position: relative;
    overflow: hidden;
  }
  .section-banner::after{
    content:"";
    position:absolute;
    bottom:0;left:40px;right:40px;height:1px;
    background: linear-gradient(90deg, transparent, rgba(200,169,110,.28) 30%, rgba(200,169,110,.28) 70%, transparent);
  }
  .banner-text{
    font-family:'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.05rem, 1.6vw, 1.35rem);
    line-height: 1.8;
    color: rgba(200,169,110,.7);
    max-width: 82ch;
    letter-spacing: .01em;
  }
  .banner-text em{
    font-style: normal;
    color: rgba(200,169,110,.96);
    font-weight: 400;
  }
  @media(max-width:640px){
    .section-banner{padding:22px}
    .banner-text{font-size:1rem}
  }
  </style>
</head>

<!-- LOADER: remove this div to disable -->
<div id="L" style="position:fixed;inset:0;z-index:9999;background:#060606;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px">
  <img src="./logo.png" id="L-img" alt="Logo"
    style="max-width:140px;max-height:70px;object-fit:contain;opacity:0;transition:opacity .4s ease;animation:fadeInLogo .5s ease .1s forwards">
  <div style="width:140px;height:1px;background:rgba(255,255,255,.07);overflow:hidden">
    <div id="L-bar" style="height:1px;width:0;background:linear-gradient(90deg,transparent,#c8a96e)"></div>
  </div>
</div>
<style>
@keyframes fadeInLogo{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
<script>
(function(){
  var el  = document.getElementById('L');
  var bar = document.getElementById('L-bar');
  if(!el) return;
  // Animate bar 0→100% over 1.2s
  var t0 = performance.now();
  (function tick(now){
    var p = Math.min((now-t0)/1200, 1);
    bar.style.width = (p*100)+'%';
    if(p < 1){ requestAnimationFrame(tick); }
    else {
      // Done — remove loader from DOM entirely
      setTimeout(function(){
        el.parentNode && el.parentNode.removeChild(el);
      }, 300);
    }
  })(performance.now());
}());
</script>

/* ============================

function buildVideoGrid(containerId,data,basePath){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const v=e.target.querySelector('video');
      if(!v)return;
      if(e.isIntersecting)v.play().catch(()=>{});else v.pause();
    });
  },{threshold:.1});
  data.forEach((item,idx)=>{
    const cell=document.createElement('div');
    cell.className='video-cell';
    const num=document.createElement('span');
    num.className='cell-num';
    num.textContent=String(idx+1).padStart(2,'0');
    const video=document.createElement('video');
    video.src=basePath+(idx+1)+'.webm';
    video.muted=true;video.loop=true;video.playsInline=true;video.preload='metadata';
    video.addEventListener('loadedmetadata',()=>cell.classList.add('loaded'));
    const overlay=document.createElement('div');
    overlay.className='cell-overlay';
    const t=document.createElement('span');
    t.className='cell-title';t.textContent=item.title;
    overlay.appendChild(t);
    if(item.link){const w=document.createElement('span');w.className='cell-watch';w.textContent='↗ Watch';overlay.appendChild(w)}
    cell.appendChild(num);cell.appendChild(video);cell.appendChild(overlay);
    cell.addEventListener('click',()=>openModal(item,video.src,'video'));
    container.appendChild(cell);io.observe(cell);
  });
}

/* ============================
   BUILD MASONRY GRID
============================ */
function buildMasonryGrid(containerId,data,basePath){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  data.forEach((item,idx)=>{
    const cell=document.createElement('div');
    cell.className='masonry-item';
    const num=document.createElement('span');
    num.className='masonry-num';
    num.textContent=String(idx+1).padStart(2,'0');
    const img=document.createElement('img');
    img.src=basePath+(idx+1)+'.'+item.ext;
    img.alt=item.title;img.loading='lazy';img.decoding='async';
    img.addEventListener('load',()=>cell.classList.add('loaded'));
    img.addEventListener('error',()=>cell.classList.add('loaded'));
    const overlay=document.createElement('div');
    overlay.className='masonry-overlay';
    const lbl=document.createElement('span');
    lbl.className='masonry-label';lbl.textContent=item.title;
    overlay.appendChild(lbl);
    cell.appendChild(num);cell.appendChild(img);cell.appendChild(overlay);
    cell.addEventListener('click',()=>openModal(item,img.src,'image'));
    container.appendChild(cell);
  });
}

const modal=document.getElementById('modal'),

function openModal(item,src,type){
  if(type==='image'){
    modalVwrap.classList.add('hidden');modalIwrap.classList.remove('hidden');
    modalImg.src=src;modalImg.alt=item.title;
    modalVideo.pause();modalVideo.src='';
  }else{
    modalIwrap.classList.add('hidden');modalVwrap.classList.remove('hidden');
    modalVideo.src=src;modalVideo.muted=false;modalVideo.play().catch(()=>{});
  }
  modalTitle.textContent=item.title;
  modalDesc.textContent=item.desc||'';
  item.link?(modalBtn.href=item.link,modalBtn.classList.remove('hidden')):modalBtn.classList.add('hidden');
  modal.classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){
  modal.classList.remove('open');
  modalVideo.pause();modalVideo.src='';modalImg.src='';
  document.body.style.overflow='';
}
document.getElementById('modal-close').addEventListener('click',closeModal);

/* ============================
   TABS + PAGE TRANSITION
============================ */
const tabs=document.querySelectorAll('.tab');
let transitioning=false;

tabs.forEach(tab=>tab.addEventListener('click',()=>{
  if(transitioning)return;
  const target=tab.dataset.page;
  const cur=document.querySelector('.page.active');
  const next=document.getElementById('page-'+target);
  if(!cur||cur===next)return;

  transitioning=true;

  // pause videos in current page
  cur.querySelectorAll('video').forEach(v=>v.pause());

  // update active tab
  tabs.forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');

  // swap pages
  cur.classList.remove('active');
  next.classList.add('active','page-in');
  next.addEventListener('animationend',()=>{
    next.classList.remove('page-in');
    transitioning=false;
    // resume visible videos
    next.querySelectorAll('.video-cell').forEach(cell=>{
      const v=cell.querySelector('video');
      const r=cell.getBoundingClientRect();
      if(v&&r.top<window.innerHeight&&r.bottom>0)v.play().catch(()=>{});
    });
  },{once:true});

  // safety timeout in case animationend never fires
  setTimeout(()=>{
    if(transitioning){
      next.classList.remove('page-in');
      transitioning=false;
    }
  },600);
}));

function applyLang(lang) {
  const t = I18N[lang];

    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.querySelectorAll('.cell-watch').forEach(el => el.textContent = t.cell_watch || el.textContent);
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = lang === 'en' ? 'RU' : 'EN';
  currentLang = lang;
}
